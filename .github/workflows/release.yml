name: Release

# Tag formats:
#   release/<mod_version>+<craftorio_version>  e.g. release/1.0.1+craftorio
#   <mod_version>                              e.g. 1.0.1  (craftorio suffix from gradle.properties)
on:
  push:
    tags:
      - "release/*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      mod_version:
        description: Mod version (mod_version_base)
        required: true
        default: "1.0.1"
      craftorio_version:
        description: Craftorio fork suffix
        required: true
        default: "craftorio"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          mod_id="$(grep '^mod_id=' gradle.properties | cut -d= -f2)"
          minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)"
          craftorio_default="$(grep '^craftorio_version=' gradle.properties | cut -d= -f2)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mod_version="${{ github.event.inputs.mod_version }}"
            craftorio_version="${{ github.event.inputs.craftorio_version }}"
            release_tag="release/${mod_version}+${craftorio_version}"
          else
            release_tag="${GITHUB_REF_NAME}"

            if [[ "$release_tag" == release/* ]]; then
              payload="${release_tag#release/}"
              mod_version="${payload%%+*}"
              craftorio_version="${payload#*+}"

              if [[ -z "$mod_version" || -z "$craftorio_version" || "$mod_version" == "$payload" ]]; then
                echo "::error::Tag payload must be <mod_version>+<craftorio_version>, got: $payload"
                exit 1
              fi
            elif [[ "$release_tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              mod_version="$release_tag"
              craftorio_version="$craftorio_default"
              echo "Using craftorio_version from gradle.properties: $craftorio_version"
            else
              echo "::error::Unsupported tag: $release_tag"
              exit 1
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "mod_id=$mod_id" >> "$GITHUB_OUTPUT"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"
          echo "craftorio_version=$craftorio_version" >> "$GITHUB_OUTPUT"
          echo "artifact_version=${mod_version}-${craftorio_version}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon \
            -Pmod_version_base="${{ steps.versions.outputs.mod_version }}" \
            -Pcraftorio_version="${{ steps.versions.outputs.craftorio_version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.release_tag }}
          name: Tacz NPCs ${{ steps.versions.outputs.mod_version }} (${{ steps.versions.outputs.craftorio_version }})
          body: |
            Mod version: `${{ steps.versions.outputs.mod_version }}`
            Craftorio suffix: `${{ steps.versions.outputs.craftorio_version }}`
            Minecraft: `${{ steps.versions.outputs.minecraft_version }}`
            Tag: `${{ steps.versions.outputs.release_tag }}`
          files: build/libs/${{ steps.versions.outputs.mod_id }}-${{ steps.versions.outputs.artifact_version }}.jar
          generate_release_notes: true
